name: Keep Database Awake

on:
  schedule:
    # This runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to run it manually to test

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -f https://jira-clone-api-owv0.onrender.com/api/users/login || echo "Backend is waking up"